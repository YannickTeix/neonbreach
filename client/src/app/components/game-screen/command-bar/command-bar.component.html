<div class="command-bar">
  <div class="suggestions" [class.hidden]="suggestions().length === 0">
    <div class="suggestion-item" *ngFor="let s of suggestions(); let i = index" [class.active]="i === activeSuggestionIdx()"
         (mousedown)="$event.preventDefault(); pickSuggestion(s)">
      <span class="suggestion-name">{{ s.name }}</span><span class="suggestion-hp">{{ s.hp }}% · {{ s.owner }}</span>
    </div>
  </div>

  <div class="cooldown-indicators">
    <div class="cooldown-item">
      <span class="cd-label">ATTACK</span>
      <div class="cd-bar"><div class="cd-fill" [style.width.%]="cooldownAttack().pct"></div></div>
      <span class="cd-timer" [class.active]="cooldownAttack().active">{{ cooldownAttack().label }}</span>
    </div>
    <div class="cooldown-item">
      <span class="cd-label">DEFEND</span>
      <div class="cd-bar"><div class="cd-fill cd-fill-green" [style.width.%]="cooldownDefend().pct"></div></div>
      <span class="cd-timer" [class.active]="cooldownDefend().active">{{ cooldownDefend().label }}</span>
    </div>
  </div>

  <div class="command-input-row">
    <span class="prompt">$</span>
    <input #input type="text" [(ngModel)]="commandText" placeholder="attack NEXUS  |  defend TITAN"
           autocomplete="off" spellcheck="false" (input)="onInput()" (keydown)="onKeydown($event)">
    <button class="btn-send" title="Envoyer" (click)="send()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="5" y1="12" x2="19" y2="12"/>
        <polyline points="12 5 19 12 12 19"/>
      </svg>
    </button>
  </div>
  <div class="command-feedback" [class.success]="false">{{ state.commandFeedback() }}</div>
</div>
