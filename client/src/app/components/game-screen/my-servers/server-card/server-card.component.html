<div class="server-scene">
  <div class="server-card"
       [class.dead]="isDead()"
       [class.attacking]="animClass() === 'attacking'"
       [class.defending]="animClass() === 'defending'"
       [class.blurchanging]="animClass() === 'blurchanging'"
       [class.glitching]="isBlurred()"
       [attr.data-server]="server.name"
       [attr.data-integrity-class]="integrityClass()">
    <div class="server-leds">
      <div class="led"></div>
      <div class="led"></div>
      <div class="led"></div>
    </div>
    <div class="server-drives">
      <div class="server-drive"
           *ngFor="let i of [0, 1, 2]"
           [class.active-core]="i < server.processingCores">
      </div>
    </div>
    <div class="server-name-tag" [class.glitching]="isBlurred()">{{ server.name }}</div>
    <div class="server-integrity-wrap">
      <div class="server-integrity-bar-bg">
        <div class="server-integrity-bar" [style.width.%]="server.currentIntegrity / server.integrityMax * 100"></div>
      </div>
      <div class="server-integrity-row">
        <span class="server-integrity-text" *ngIf="!isDead()">{{ server.currentIntegrity }}/{{ server.integrityMax }}</span>
        <div class="integrity-boosts" *ngIf="!isDead()">
          <div class="integrity-boost"
               *ngFor="let i of boostSlots"
               [class.applied]="i < server.integrityUpgrades"
               [class.pending]="i >= server.integrityUpgrades && i < server.integrityUpgrades + pendingBoosts()">
          </div>
        </div>
      </div>
    </div>
    <div class="server-neofrag-rate" *ngIf="!isDead()">
      +{{ server.neofragGain }}&thinsp;<svg class="neofrag-icon-mini" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
        <polygon points="10,9.5 17,6 17,14.5 10,18" fill="#001177" fill-opacity="0.28"/>
        <polygon points="10,9.5 3,6 3,14.5 10,18" fill="#001199" fill-opacity="0.28"/>
        <polygon points="10,2.5 17,6 10,9.5 3,6" fill="#0077cc" fill-opacity="0.18"/>
        <polygon points="10,2.5 17,6 10,9.5 3,6" fill="none" stroke="#00eeff" stroke-width="0.8" stroke-linejoin="round"/>
        <polyline points="3,6 3,14.5 10,18 17,14.5 17,6" fill="none" stroke="#0099cc" stroke-width="0.7" stroke-linejoin="round"/>
        <line x1="10" y1="9.5" x2="10" y2="18" stroke="#0088cc" stroke-width="0.6"/>
        <line x1="10" y1="2.5" x2="10" y2="9.5" stroke="#00ffff" stroke-width="0.4" stroke-opacity="0.6"/>
        <line x1="3" y1="10.25" x2="17" y2="10.25" stroke="#0066cc" stroke-width="0.3" stroke-opacity="0.45" stroke-dasharray="1,1"/>
        <polygon points="10,2.5 13.5,4.25 10,6 6.5,4.25" fill="white" fill-opacity="0.18"/>
        <circle cx="10" cy="2.5" r="0.9" fill="#00ffff" fill-opacity="0.95"/>
      </svg>&thinsp;/&thinsp;{{ server.neofragFreq / 1000 }}s
    </div>

    <div class="server-research-indicator" *ngIf="!isDead() && researchOnServer() as r">
      <span class="research-state-preparing" *ngIf="r.state === 'preparing'">⏳ research</span>
      <span class="research-state-active" *ngIf="r.state === 'active'">◉ research</span>
    </div>

    <div class="server-breach-indicator" *ngIf="!isDead() && breacherOnServer() as b">
      <span class="breach-state-preparing" *ngIf="b.state === 'preparing'">⏳ breacher</span>
      <span class="breach-state-ready" *ngIf="b.state !== 'preparing'">⚡ {{ b.name }}</span>
    </div>

    <div class="float-popup" *ngIf="popupText()" [class.damage]="animClass() === 'attacking'" [class.heal]="animClass() === 'defending'">
      {{ popupText() }}
    </div>
  </div>
</div>
